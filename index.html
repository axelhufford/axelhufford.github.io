<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axel Hufford</title>
  <meta name="description" content="Axel Hufford - Creator of Movi and 4th Quarter" />
  <meta property="og:title" content="Axel Hufford" />
  <meta property="og:description" content="Creator of Movi and 4th Quarter" />
  <meta property="og:url" content="https://axelhufford.com/" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%23ff4d4d'/%3E%3Cg transform='translate(8,14)'%3E%3Crect x='0' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3Crect x='11.5' y='-1' width='10' height='12' rx='1' fill='none' stroke='white' stroke-width='1.5'/%3E%3Crect x='23' y='0' width='9' height='11' rx='1' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='1.5'/%3E%3C/g%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0c;
      color: #f0efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6e6e7a;
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .project {
      background: #111115;
      border: 1px solid #18181e;
      border-radius: 16px;
      padding: 32px 24px;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }
    .project:hover {
      border-color: #ff4d4d;
      transform: translateY(-3px);
    }
    .project-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0efe8;
      margin-bottom: 6px;
    }
    .project-desc {
      color: #6e6e7a;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .project-link {
      color: #ff4d4d;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* Movi logo */
    .logo-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 14px;
    }
    .logo-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 34px;
      height: 42px;
      border: 2px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.025);
    }
    .logo-frame.active {
      border-color: #ff4d4d;
      background: rgba(255,77,77,0.07);
      transform: scale(1.1);
      z-index: 2;
      box-shadow: 0 0 20px rgba(255,77,77,0.25);
    }
    .logo-frame .frame-num {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: rgba(255,255,255,0.16);
    }
    .logo-frame.active .frame-num {
      color: #ff4d4d;
    }
    .logo-frame .sprocket {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 9px;
      height: 3px;
      border-radius: 1px;
      background: rgba(255,255,255,0.08);
    }
    .logo-frame.active .sprocket {
      background: rgba(255,77,77,0.28);
    }
    .sprocket-top { top: 3px; }
    .sprocket-bot { bottom: 3px; }

    /* 4th Quarter card */
    .logo-4q { margin-bottom: 14px; }
    .project-4q:hover { border-color: #f97316; }
    .project-link-4q { color: #f97316; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Axel Hufford</h1>
    <p class="subtitle">Projects</p>
    <a href="https://movirank.com" class="project">
      <div class="logo-strip">
        <div class="logo-frame"><span class="sprocket sprocket-top"></span><span class="frame-num">3</span><span class="sprocket sprocket-bot"></span></div>
        <div class="logo-frame active"><span class="sprocket sprocket-top"></span><span class="frame-num">1</span><span class="sprocket sprocket-bot"></span></div>
        <div class="logo-frame"><span class="sprocket sprocket-top"></span><span class="frame-num">2</span><span class="sprocket sprocket-bot"></span></div>
      </div>
      <div class="project-name">Movi</div>
      <p class="project-desc">Every movie ranked, one matchup at a time. Compare, rank, and discover films with friends.</p>
      <span class="project-link">movirank.com &rarr;</span>
    </a>

    <a href="https://4th-quarter-sooty.vercel.app" class="project project-4q" style="margin-top: 16px;">
      <div class="logo-4q">
        <svg width="48" height="48" viewBox="0 0 200 200" aria-label="4th Quarter">
          <path d="M 100 100 L 100 55 A 45 45 0 0 1 145 100 Z" fill="#18181b" />
          <path d="M 100 100 L 100 145 A 45 45 0 0 1 55 100 Z" fill="#18181b" />
          <path d="M 100 100 L 55 100 A 45 45 0 0 1 100 55 Z" fill="#18181b" />
          <path d="M 100 100 L 175 100 A 75 75 0 0 1 100 175 Z" fill="#f97316" />
          <circle cx="100" cy="100" r="60" fill="none" stroke="#f97316" stroke-width="30" />
          <line x1="132" y1="132" x2="180" y2="180" stroke="#f97316" stroke-width="28" stroke-linecap="round" />
        </svg>
      </div>
      <div class="project-name">4th Quarter</div>
      <p class="project-desc">Skip the first three. Catch the fourth. Get notified when your NBA team's game hits the final quarter.</p>
      <span class="project-link project-link-4q">4th-quarter-sooty.vercel.app &rarr;</span>
    </a>
  </div>
</body>
</html>
