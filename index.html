<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axel Hufford</title>
  <meta name="description" content="Axel Hufford - Creator of Movi" />
  <meta property="og:title" content="Axel Hufford" />
  <meta property="og:description" content="Creator of Movi - rank every movie, one matchup at a time." />
  <meta property="og:url" content="https://axelhufford.com/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0c;
      color: #f0efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6e6e7a;
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .project {
      background: #111115;
      border: 1px solid #18181e;
      border-radius: 16px;
      padding: 32px 24px;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }
    .project:hover {
      border-color: #ff4d4d;
      transform: translateY(-3px);
    }
    .project-emoji {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .project-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0efe8;
      margin-bottom: 6px;
    }
    .project-desc {
      color: #6e6e7a;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .project-link {
      color: #ff4d4d;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Axel Hufford</h1>
    <p class="subtitle">Projects</p>
    <a href="https://movirank.com" class="project">
      <div class="project-emoji">&#127916;</div>
      <div class="project-name">Movi</div>
      <p class="project-desc">Every movie ranked, one matchup at a time. Compare, rank, and discover films with friends.</p>
      <span class="project-link">movirank.com &rarr;</span>
    </a>
  </div>
</body>
</html>
